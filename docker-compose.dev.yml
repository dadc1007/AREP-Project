version: '3.8'

services:
  api:
    build: .
    container_name: rag-fastapi-app-dev
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - ./tmp_data:/app/tmp_data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    container_name: rag-postgres-dev
    restart: always
    env_file:
      - .env.dev
    ports:
      - "54321:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_admin -d rag_multitenant"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:

networks:
  default:
    name: rag-network-dev
