version: '3.8'

services:
  api:
    build: .
    container_name: rag-fastapi-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    volumes:
      - ./tmp_data:/app/tmp_data
    restart: always
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    container_name: rag-postgres
    restart: always
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

networks:
  default:
    name: rag-network
